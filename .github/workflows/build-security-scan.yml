name: complete flow
on: 
  push: 
    branches:
      -  main
      
permissions:
  contents: write    

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build
        run: mvn clean package
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar
  test:
      needs: build  
      runs-on: ubuntu-latest
      steps: 
        - uses: actions/checkout@v4 
        - name: Setup Java
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: 21 
        - name: Run Tests
          run: mvn test
  sonar:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Compile Project
        run: mvn clean compile
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=OrgExample123_hello-world
            -Dsonar.organization=orgexample123
            -Dsonar.java.binaries=target/classes
  docker:
    needs: sonar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build Jar
        run: mvn clean package -DskipTests
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-world:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/hello-world:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/hello-world:latest
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hello-world:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/hello-world:latest
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Login to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/hello-world:latest

            docker stop container1 || true
            docker rm container1 || true

            docker run -d \
              --name container1 \
              -p 8080:8080 \
              ${{ secrets.DOCKER_USERNAME }}/hello-world:latest
